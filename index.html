<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Frequency: SEA ↔ ATL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000010;
            color: #fff;
            overflow: hidden;
        }

        #globe {
            width: 100vw;
            height: 100vh;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 400;
            border: 1px solid #333;
            max-width: 280px;
        }

        #info h2 {
            font-size: 15px;
            margin-bottom: 6px;
        }

        #info .hint {
            font-size: 11px;
            opacity: 0.6;
        }

        #routes {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 15px 20px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 400;
            border: 1px solid #333;
            min-width: 220px;
        }

        #routes h3 {
            font-size: 13px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .route-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0;
            gap: 15px;
        }

        .route-name {
            font-weight: 600;
        }

        .route-count {
            font-weight: bold;
            font-size: 14px;
        }

        .sea-color { color: #4ade80; }
        .atl-color { color: #f87171; }

        #stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 12px;
            z-index: 400;
            border: 1px solid #333;
        }

        .stat-row {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            gap: 25px;
        }

        .stat-label { opacity: 0.6; }

        .stat-value {
            font-weight: bold;
            color: #4ade80;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            z-index: 500;
        }

        .spinner {
            border: 3px solid rgba(74, 222, 128, 0.2);
            border-top: 3px solid #4ade80;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .plane-icon {
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            text-shadow: 0 0 4px #000;
            user-select: none;
        }

        .airport-label {
            text-align: center;
            user-select: none;
        }

        .airport-label .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin: 0 auto;
        }

        .airport-label .code {
            font-weight: bold;
            font-size: 13px;
            text-shadow: 0 0 4px #000, 0 0 8px #000;
            margin-top: 2px;
        }

        .plane-tooltip {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 11px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading globe...</p>
    </div>

    <div id="globe"></div>

    <div id="info">
        <h2>Live Flights: SEA ↔ ATL Corridor</h2>
        <div class="hint">Drag to rotate • Scroll to zoom • Click a plane for details</div>
    </div>

    <div id="routes">
        <h3>Routes</h3>
        <div class="route-row">
            <span class="route-name sea-color">Arriving SEA</span>
            <span class="route-count sea-color" id="toSeaCount">0</span>
        </div>
        <div class="route-row">
            <span class="route-name sea-color">Departing SEA</span>
            <span class="route-count sea-color" id="fromSeaCount">0</span>
        </div>
        <div class="route-row">
            <span class="route-name atl-color">Arriving ATL</span>
            <span class="route-count atl-color" id="toAtlCount">0</span>
        </div>
        <div class="route-row">
            <span class="route-name atl-color">Departing ATL</span>
            <span class="route-count atl-color" id="fromAtlCount">0</span>
        </div>
        <div style="margin-top: 8px; font-size: 10px; opacity: 0.5;">
            Hover a plane to see its route
        </div>
    </div>

    <div id="stats">
        <div class="stat-row">
            <span class="stat-label">Near SEA/ATL:</span>
            <span class="stat-value" id="flightCount">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Worldwide shown:</span>
            <span class="stat-value" id="worldCount">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Last update:</span>
            <span class="stat-value" id="lastUpdate">--:--</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.32.2/dist/globe.gl.min.js"></script>
    <script src="flight-viz.js"></script>
</body>
</html>
